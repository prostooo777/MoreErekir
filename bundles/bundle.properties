sector.mod-for-elder-1ambush.description = [lightgray]After capturing the Source sector, a new sector was discovered on Erekir - one that had been hidden all along. However, during the flight there, you suffered a crash, forcing you to make an emergency landing in a strange location...\n[gold]Sector Tip: [lightgray]Prepare to get all necessary materials and set up the strongest defenses possible - otherwise, your core will not survive. You have a feeling that time is running out! And be sure to unlock all Erekir technologies.
sector.mod-for-elder-2arrival.description = [lightgray]You successfully survived the ambush and landed in the next sector - which seems to lead somewhere... However, the attack and the crash caused you to lose some of your technology. You must gradually restore it and capture subsequent bases to completely wipe out Malis from Erekir.\n[gold]Sector Tip: [lightgray]Set up basic ore and silicon extraction, build some defenses, and produce combat units to destroy the enemy core.
sector.mod-for-elder-3metalline.description = [lightgray]This sector is significantly different from the others, but the Malis have left a presence here. Destroy them and seize the tungsten while you are at it. Then, move on.\n[gold]Sector Tip: [lightgray]Capture the Abandoned Core, produce tanks / mechs, and cut off the ammo supply - this will make capturing all the cores easier. Do not forget to mine tungsten.
sector.mod-for-elder-4meltdown.description = [lightgray]After the gray, dead sector, you have moved to an environment even more vibrant than the others. This sector features high temperatures and vast quantities of slag - it seems Malis has a great need for it.\n[gold]Sector Tip: [lightgray]Act as quickly as possible: mining, silicon, turrets, and units - you have limited time for everything, and the enemy will not wait. Mine some tungsten for more effective defense.
sector.mod-for-elder-5caliopsa.description = [lightgray]Radar has detected a sector with wildly anomalous temperatures - the reason for this is unclear. An enemy research base, Malis, is also located here. It appears they are researching slag.\n[gold]Sector Tip: [gray]Mine tungsten, immediately start producing Tier - 2 tanks, and head to the right - things will get easier from there. Build defenses on that side, and preferably on the other side as well.
sector.mod-for-elder-6goldenpits.description = [lightgray]Golden pits... one might expect this sector to glitter, yet it looks even duller than the others - and there is not even any gold plating to be found. Several enemy bases are located here, boasting strong anti - air defenses. Capture this sector, and your radar will guide you to the next objective.\n[gold]Sector Tip: [lightgray]Place power generators in the nearby pit and set up defenses before attacking enemy cores. The enemy here is unpredictable - if something is not protected, it will not last long. Also, explore every nook and cranny - the enemy is everywhere.
sector.mod-for-elder-7tunnel.description = [lightgray]Your radar guides you through the tunnel that leads to the next sector. A strange, pulsating signal is emanating from there, weakening your units while enemy's units are stronger. Make your way through the tunnel to the Sacred Sector and destroy the source of the signal. If possible.\n[gold]Sector Tip: [lightgray]Produce mechs, destroy the ammunition supply, and take out the first core. Next, produce tier 2 tanks and mechs, and employ tactical maneuvers. Mine Thorium to build tier 3 tanks. They're more effective against enemy defenses.
sector.mod-for-elder-8sacral.description = [lightgray]After passing through the Tunnel, we discovered an incredibly dangerous sector where combat units can't even get airborne, leaving only one unit option: Tanks. Destroy the Malis research base here to prevent future problems.\n[gold]Sector tip:[lightgray]First things first: Install the core as you just came here. You won't be able to produce anything other than tanks, so the only option is to get the necessary resources as quickly as possible and produce better tanks. 
sector.mod-for-elder-9degradation.description = [lightgray]The radar showed you some terribly encrypted sector, which is ultra-guarded, but the way there is literally impossible, it is guarded from everything, you need to destroy the security system, to do this, destroy this Sector, and then the way to somewhere practically unknown will open up for you.\n[gold]Sector tip: [lightgray]Mine all the ore you can, as there is little lying around in the sector, and most of it requires exploration outside the open area. Core capture: choose left or right, their defenses are the same, then produce tier 2 ships.
sector.mod-for-elder-10gammat1.description = [lightgray]After destroying the entire Malis base in the Degradation sector, the Gamma-T1 defense system was removed. There's something very special about this sector. Capture it, and then you'll find out. Also, somewhere nearby, a radar is starting to behave very erratically...\n[gold]Sector tip: [lightgray]The first two bases will be easy to capture for Tungsten, then produce T-2 units to capture the next two to unlock T-2 ships/kinetics, after which you will need to destroy another core for Thorium, and so on. Air units can find hidden ore deposits to mine, many of which are guarded.
sector.mod-for-elder-11alphat7.description = [lightgray]Having discovered a portal at the last base in sector Gamma-T1, through which your core was transported to this sector, where the radar wasn't just malfunctioning randomly, it actually broke and shut down. Sector Alpha-T7 is likely the most secure base on Erekir, and traces of ancient technology were discovered there, many of them. Even before the complete shutdown of the radar and locators, they discovered that Malis was preparing to land on another planet, Serpulo. Destroy everything here, don't let them carry out their plan. Also, sector Alpha-T7 is the last sector with the enemy Malis faction. After its complete destruction and capture, nothing will remain of Malis.\n[gold]Sector tip: [lightgray]???? ?? ??? ???, ??? ???? ???!
sector.mod-for-elder-12ambushextra.description = [lightgray]You can finally say goodbye to Malis, their bases are no longer on Erekir, but they managed to send their last units at you, intercept them and destroy them.\n[gold]Sector tip: [lightgray]Think 4 steps ahead, you won’t be able to use time or plans, and you’re only given 90 minutes for everything.\n[lightgray]( A highly complex version of "Ambush" )
