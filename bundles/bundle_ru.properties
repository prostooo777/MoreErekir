sector.mod-for-elder-1ambush.description = [lightgray]После захвата сектора Источник, был обнаружен новый сектор на Эрекире, который был спрятан всё время, но по полёту туда, у вас случилась авария, из - за чего вы экстренно приземлились в странное место...\n[gold]Подсказка сектора: [lightgray]Срочно подготовьте добычу всех необходимых материалов, также подготовьте максимальную защиту что сможете, иначе ваше ядро тут не выживет, что-то вам подсказывает что у вас очень мало времени!
sector.mod-for-elder-2arrival.description = [lightgray]Вы успешно смогли выжить в Засаде, после чего и успешно приземлится на следующем секторе, который как кажется ведёт куда-то... Но также из - за атаки и аварии, вы растеряли часть своих технологии. По этому вам придётся по немного их восстанавливать и захватывать последующие базы, чтобы полностью уничтожить Малис с Эрекира.\n[gold]Подсказка сектора: [lightgray]Поставте добычу базовых руд и кремний, сделайте небольшую защиту и произведите боевых единиц для разрушение вражеского ядра.
sector.mod-for-elder-3metalline.description = [lightgray]Этот сектор, сильно отличается от остальных, но также тут что-то забыли Малис, уничтожьте их и захватите заодно себе вольфрам. После чего двигайтесь дальше.\n[gold]Подсказка сектора: [lightgray]Захватите ядро покинутых, производите танков / мехов и отключайте постачу боеприпасов так будет легче захватить все ядра. Не забудьте добывать вольфрам.
sector.mod-for-elder-4meltdown.description = [lightgray]После серого и мёртвого сектора вы перешли к состоянию, более яркому даже, чем другие. Этот сектор с высокой температурой и огромным количеством шлаков, похоже, Малис он очень нужен.[gold]Подсказка сектора: [lightgray]Делайте всё, как можно скорее: добыча, кремний, турели и юниты, на всё у вас ограниченное время, враг не ждёт. Добудьте небольшой вольфрам для более эффективной защиты.
sector.mod-for-elder-5caliopsa.description = [lightgray]По радару был зафиксирован сектор, с бешено-аномальной температурой, почему тут так непонятно. Тут также вражеская исследовательская база Малис, похоже они исследуют здесь шлак.\n[gold]Подсказка сектора: [lightgray]Добудьте вольфрам, начните делать сразу 2й уровень танков и идите направо, дальше будет легче и постройте оборону с той же стороны и лучше с другой тоже.
sector.mod-for-elder-6goldenpits.description = [lightgray]Золотые ямы... Казалось бы, этот сектор должен был бы сверкать, но тут даже более тускло чем на других, а ещё тут даже золотого покрытия не имеется. Ещё тут несколько вражеских баз с хорошей защитой от воздуха. Захватите этот сектор, после чего вас радар проведёт дальше за ним.\n[gold]Подсказка сектора: [lightgray]Поставьте генераторы энергии в яме рядом, и сделайте защиту прежде чем начинать атаковать вражеские ядра, враг тут действует непредсказуемо, если что-то не будет защищено, то оно тут не на долго останется. Также исследуйте каждый уголок. Враг везде и всюду.
sector.mod-for-elder-7tunnel.description = [lightgray]Радар ведёт вас дальше через туннель ведущий к следующему сектору, оттуда издаётся странный пульсирующий сигнал ослабляющий ваших юнитов и усиливающий вражеских, пройдите по туннелю до следующего сектора и уничтожьте издающийся сигнал. Если это возможно.\n[gold]Подсказка сектора: [lightgray]Производите мехов сломайте постачу боеприпасов и разруште первое ядро. Далее производите 2й уровень танков и 2й уровень мехов и используйте тактику. Добудьте Тория и сделайте танки 3го уровня. Они более эффективны против обороны.
sector.mod-for-elder-8sacral.description = [lightgray]Пройдя через Туннель, обнаружили невероятно опасный сектор, в нём не получается подняться боевым единицам даже немного в воздух, из - за чего только один вариант юнитов: Танки. Уничтожьте тут исследовательскую базу Малис, чтобы в будущем с ними не возникло проблем.\n[gold]Подсказка сектора: [lightgray]Для начала: Поставьте ядро, так как вы просто пришли сюда. Произвести кого - либо кроме танков не выйдет, так что остаётся лишь как можно быстрее получить необходимые ресурсы и производить более качественных танков.
sector.mod-for-elder-9degradation.description = [lightgray]Радар вам показал какой-то ужасно зашифрованный сектор, который ультра охраняется, но путь туда буквально невозможен, он охраняется от всего, нужно разрушить систему защиты, для этого уничтожьте этот Сектор, и тогда вам возможно откроется путь куда-то в практически неизвестность.\n[gold]Подсказка сектора: [lightgray]Добывайте всю руду что сможете, так как на секторе просто так мало валяется, а в основном много чтобы добывать нужно исследовать не в открытой зоне. захват ядер: на выбор левая или правая их защита одинаковая, затем производите 2й уровень кораблей
sector.mod-for-elder-10gammat1.description = [lightgray]Уничтожив всю базу Малис на секторе Деградация, снялась система защиты из Гамма-Т1, чем-то этот сектор очень особенный, захватите его, и тогда вы узнаете. Также где-то рядом радар начинает вести себя слишком хаотично...\n[gold]Подсказка сектора: [lightgray]Первые 2 базы будет захватить легко для получение Вольфрама, далее производите т-2 юнитов для захвата последующих два для разблокировки т-2 кораблей/кинетики, после чего нужно будет разрушить ещё одно ядро для Тория, и т. д. Воздушными юнитами можно найти скрытые места с рудами для своей добычи, многие из них охраняются.
sector.mod-for-elder-11alphat7.description = [lightgray]Обнаружив на последней базе сектора Гамма-Т1 Portal, через какой ваше ядро переместило как раз в этот сектор где радар не то чтобы хаотично барахлил, он вообще сломался и выключился. На секторе Альфа-Т7, находится скорее всего самая защищённая база из всех что есть на Эрекире, и тут были обнаружены следы древних технологий, там их много. Ещё перед полный отключением радара и локаторов, они обнаружили что Малис готовится высадится на другую планету, Серпуло. Уничтожьте тут всё что можно, не дайте им исполнить свой план. Ещё сектор Альфа-Т7, это последний сектор с вражеской фракцией Малис, после его полного уничтожение и захвата, от Малис ничего не останется.\n[gold]Подсказка сектора: [lightgray]??? ?????, ?? ??????!
sector.mod-for-elder-12ambushextra.description = [lightgray]Вы наконец-то можете распращатся с Малис, их баз больше нету на Эрекире, но они успели послать своих последних юнитов на вас, перехватите их и уничтожьте.\n[gold]Подсказка сектора: [lightgray]Думайте сразу на 4 шага наперёд, воспользоваться временем или схемами у вас не выйдет, а всего даётся на всё 90 минут.\n[lightgray]( Сильно усложнена версия "Засады" )
